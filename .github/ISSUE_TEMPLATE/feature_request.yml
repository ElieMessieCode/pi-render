name: ✨ Feature Request
description: Suggest a new feature
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for suggesting improvements to pi-render!
        
  - type: textarea
    id: problem
    attributes:
      label: Problem to Solve
      description: Describe the current problem or limitation.
      placeholder: "I would like to be able to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the solution you'd like.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative solutions?

  - type: textarea
    id: examples
    attributes:
      label: Usage Examples
      description: Show how this feature would be used.
      placeholder: |
        render_visual({
          title: "...",
          content: "..."
        })

  - type: dropdown
    id: type
    attributes:
      label: Feature Type
      options:
        - New SVG component
        - UI improvement
        - New API route
        - Performance improvement
        - Documentation
        - Other
    validations:
      required: true
