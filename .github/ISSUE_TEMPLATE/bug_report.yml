name: 🐛 Bug Report
description: Signaler un bug dans pi-render
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de remplir ce formulaire pour signaler un bug.
        
  - type: textarea
    id: description
    attributes:
      label: Description du bug
      description: Une description claire et concise du bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      description: Comment reproduire ce comportement ?
      placeholder: |
        1. Aller dans '...'
        2. Cliquer sur '...'
        3. Observer l'erreur
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
      description: Décrivez ce que vous attendiez.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportement observé
      description: Décrivez ce qui se passe réellement.
    validations:
      required: true

  - type: input
    id: node-version
    attributes:
      label: Version Node.js
      placeholder: "ex: 20.10.0"
    validations:
      required: true

  - type: input
    id: pi-version
    attributes:
      label: Version pi-render
      placeholder: "ex: 1.0.0"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Coller les logs depuis la page /debug si disponible
      render: shell

  - type: textarea
    id: additional
    attributes:
      label: Informations supplémentaires
      description: Tout autre contexte utile.
